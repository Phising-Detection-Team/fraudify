name: CI - Run Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

# ---------------------------------------------------------------------------
# Shared service + step definitions (repeated per job — GH Actions has no
# native YAML anchors, so duplication is unavoidable without composite actions)
# ---------------------------------------------------------------------------

jobs:

  # --------------------------------------------------------------------------
  # Backend group 1: database migration tests
  # These are the slowest tests; isolated so they don't block other groups.
  # --------------------------------------------------------------------------
  test-backend-migrations:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: phishing_user
          POSTGRES_PASSWORD: phishing_password
          POSTGRES_DB: phishing_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Create migration test database
      env:
        PGPASSWORD: phishing_password
      run: psql -h localhost -U phishing_user phishing_test_db -c "CREATE DATABASE phishing_test_db_migrations;"

    - name: Run migration tests
      env:
        DATABASE_URL: postgresql://phishing_user:phishing_password@localhost:5432/phishing_test_db
        MIGRATION_DATABASE_URL: postgresql://phishing_user:phishing_password@localhost:5432/phishing_test_db_migrations
        FLASK_ENV: testing
        FLASK_CONFIG: testing
        JWT_SECRET_KEY: test-jwt-secret-for-ci
      run: |
        python -m pytest tests/test_migrations.py tests/database_rules_test.py -v --tb=short

  # --------------------------------------------------------------------------
  # Backend group 2a: HTTP route tests — lighter files (use conftest.py fixtures)
  # --------------------------------------------------------------------------
  test-backend-routes-a:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: phishing_user
          POSTGRES_PASSWORD: phishing_password
          POSTGRES_DB: phishing_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run route tests (group A)
      env:
        DATABASE_URL: postgresql://phishing_user:phishing_password@localhost:5432/phishing_test_db
        FLASK_ENV: testing
        FLASK_CONFIG: testing
        JWT_SECRET_KEY: test-jwt-secret-for-ci
      run: |
        python -m pytest \
          tests/test_routes_auth.py \
          tests/test_routes_costs.py \
          tests/test_routes_emails.py \
          tests/test_routes_extension.py \
          tests/test_routes_feedback.py \
          tests/test_routes_logs.py \
          tests/test_routes_rounds.py \
          tests/test_routes_scan.py \
          tests/test_routes_stats.py \
          tests/test_routes_users.py \
          tests/test_rate_limiting.py \
          tests/test_limiter_bug.py \
          -v --tb=short

  # --------------------------------------------------------------------------
  # Backend group 2b: HTTP route tests — heavyweight files (own session fixtures)
  # --------------------------------------------------------------------------
  test-backend-routes-b:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: phishing_user
          POSTGRES_PASSWORD: phishing_password
          POSTGRES_DB: phishing_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run route tests (group B)
      env:
        DATABASE_URL: postgresql://phishing_user:phishing_password@localhost:5432/phishing_test_db
        FLASK_ENV: testing
        FLASK_CONFIG: testing
        JWT_SECRET_KEY: test-jwt-secret-for-ci
      run: |
        python -m pytest \
          tests/test_routes_stats_backend.py \
          tests/test_routes_scan_backend.py \
          tests/test_socket_events.py \
          -v --tb=short

  # --------------------------------------------------------------------------
  # Backend group 3: unit tests — models, utils, services, findings
  # --------------------------------------------------------------------------
  test-backend-unit:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: phishing_user
          POSTGRES_PASSWORD: phishing_password
          POSTGRES_DB: phishing_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://phishing_user:phishing_password@localhost:5432/phishing_test_db
        FLASK_ENV: testing
        FLASK_CONFIG: testing
        JWT_SECRET_KEY: test-jwt-secret-for-ci
      run: |
        python -m pytest \
          tests/test_models.py \
          tests/test_models_auth.py \
          tests/test_models_extension.py \
          tests/test_api_utils.py \
          tests/test_db_utils.py \
          tests/test_email_verification.py \
          tests/test_email_verification_service.py \
          tests/test_celery_scan.py \
          tests/test_scan_cache.py \
          tests/test_high_findings.py \
          tests/test_medium_findings.py \
          tests/test_openai_orchestrator_smoke.py \
          -v --tb=short

  # --------------------------------------------------------------------------
  # Frontend
  # --------------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install --no-audit

    - name: Run frontend tests
      working-directory: frontend
      run: npm test

  # --------------------------------------------------------------------------
  # Failure notification (runs only when any job fails)
  # --------------------------------------------------------------------------
  notify:
    runs-on: ubuntu-latest
    needs: [test-backend-migrations, test-backend-routes-a, test-backend-routes-b, test-backend-unit, test-frontend]
    if: failure()

    steps:
    - name: Send failure notification
      continue-on-error: true
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "❌ CI Pipeline Failed - Phishing Detection Tests"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: "GitHub Actions <noreply@github.com>"
        body: |
          **Test Failure Alert**

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}

          **Failed Workflow:**
          - Workflow: ${{ github.workflow }}
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please check the logs above for details.

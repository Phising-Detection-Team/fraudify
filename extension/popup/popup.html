<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentra</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">
      <img src="../icons/icon32.png" alt="Sentra" class="logo-icon" />
      <span>Sentra</span>
    </span>
    <span class="status-dot" id="statusDot" title="Connection status"></span>
  </div>

  <!-- Not logged in -->
  <div id="viewLogin" class="view hidden">
    <p class="hint">Log in to Sentra to enable email scanning.</p>
    <button id="btnOpenDashboard" class="btn btn-primary">Open Sentra Dashboard</button>
  </div>

  <!-- Logged in -->
  <div id="viewMain" class="view hidden">
    <div class="info-row">
      <span class="label">Logged in as</span>
      <span class="value" id="userEmail">—</span>
    </div>
    <div class="info-row">
      <span class="label">Instance</span>
      <span class="value monospace" id="instanceToken">—</span>
    </div>
    <div class="divider"></div>
    <p class="hint">Sentra automatically scans emails when you open them in Gmail or Outlook.</p>
    <div id="scan-history-section" class="section">
      <div class="section-title">Recent Scans</div>
      <ul id="scan-history-list" class="scan-history-list"></ul>
      <div id="scan-history-empty" class="empty-state" style="display:none">No scans yet</div>
      <a href="#" id="view-all-link" class="view-all-link">View all in dashboard &rarr;</a>
    </div>
    <button id="btnLogout" class="btn btn-secondary">Log Out</button>
    <button id="btnOpenDashboard2" class="btn btn-primary">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
